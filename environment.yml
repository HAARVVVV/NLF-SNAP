name: TFG_CVAE_clean
channels:
  - defaults

dependencies:
  - python=3.11
  - pip
  - spyder-kernels
  - pip:
      - numpy
      - matplotlib
      - librosa
      - soundfile
      - pandas
      - scikit-learn
      - audiomentations
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.9.1
      - torchvision==0.24.1
      - torchaudio==2.9.1